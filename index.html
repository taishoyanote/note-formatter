<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>note 読みやすく整形</title>

  <link rel="manifest" href="manifest.json">
  <meta name="theme-color" content="#41c9b4">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="default">
  <meta name="apple-mobile-web-app-title" content="note整形">
  <link rel="apple-touch-icon" href="icon-192.png">

  <link href="https://fonts.googleapis.com/css2?family=Noto+Serif+JP:wght@400;600&family=Noto+Sans+JP:wght@300;400;500&display=swap" rel="stylesheet">

  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: 'Noto Sans JP', sans-serif;
      background: #faf8f4;
      min-height: 100vh;
      color: #1a1a1a;
      padding-bottom: 60px;
    }
    .header {
      padding: 40px 24px 20px;
      border-bottom: 1px solid #e8e4de;
      display: flex;
      align-items: baseline;
      gap: 12px;
    }
    .logo { font-family: 'Noto Serif JP', serif; font-size: 28px; font-weight: 600; letter-spacing: -0.5px; }
    .logo-sub { font-size: 13px; color: #1a1a1a; font-weight: 400; letter-spacing: 0.05em; }
    .wrap {
      max-width: 780px;
      margin: 0 auto;
      padding: 24px 24px 0;
      display: flex;
      flex-direction: column;
      gap: 14px;
    }
    .card { background: #fff; border: 1px solid #e8e4de; border-radius: 6px; overflow: hidden; }
    .card-header {
      padding: 9px 14px;
      background: #fdfcfa;
      border-bottom: 1px solid #e8e4de;
      font-size: 13px;
      font-weight: 600;
      color: #1a1a1a;
      display: flex;
      align-items: center;
      justify-content: space-between;
    }
    textarea {
      width: 100%; border: none; outline: none; resize: none;
      font-family: 'Noto Sans JP', sans-serif;
      font-size: 14px; line-height: 1.9; padding: 14px;
      color: #1a1a1a; background: transparent; display: block;
    }
    textarea::placeholder { color: #bbb; }
    .resize-bar {
      display: flex; align-items: center; gap: 6px;
      padding: 5px 12px; background: #f0fdfb;
      border-top: 1.5px dashed #b8e8e2;
      cursor: ns-resize; user-select: none;
    }
    .resize-bar span { font-size: 12px; color: #41c9b4; font-weight: 500; }
    .setting-row {
      padding: 10px 14px; display: flex; align-items: center;
      gap: 8px; font-size: 13px; color: #1a1a1a;
      white-space: nowrap; overflow-x: auto;
    }
    .setting-row input[type=number] {
      width: 52px; border: 1.5px solid #d8d2ca; border-radius: 6px;
      padding: 4px 6px; font-family: inherit; font-size: 13px;
      font-weight: 600; outline: none; text-align: center;
      color: #1a1a1a; background: #fff; flex-shrink: 0;
    }
    .setting-row input[type=number]:focus { border-color: #41c9b4; }
    .tag-short {
      background: #e8f8f5; color: #0f6e56; padding: 3px 10px;
      border-radius: 20px; font-size: 12px; font-weight: 500;
      white-space: nowrap; flex-shrink: 0;
    }
    .tag-long {
      background: #fff3e0; color: #c46000; padding: 3px 10px;
      border-radius: 20px; font-size: 12px; font-weight: 500;
      white-space: nowrap; flex-shrink: 0;
    }
    .btn-primary {
      background-color: #41c9b4 !important;
      color: #ffffff !important;
      border: none; border-radius: 6px; padding: 14px;
      font-size: 14px; font-weight: 500; cursor: pointer;
      width: 100%; font-family: 'Noto Sans JP', sans-serif;
      letter-spacing: 0.03em; text-align: center; display: block;
    }
    .btn-primary:hover { background-color: #2da898 !important; }
    .btn-primary:active { transform: scale(0.98); }
    .output-tools { display: flex; gap: 6px; align-items: center; }
    .btn-icon {
      background: transparent; color: #1a1a1a;
      border: 1.5px solid #e8e4de; padding: 4px 10px;
      font-size: 12px; font-weight: 600; border-radius: 7px;
      cursor: pointer; font-family: inherit;
    }
    .btn-icon:disabled { opacity: .3; cursor: default; }
    .btn-copy {
      background: #e8f8f5; color: #0f6e56;
      border: 1.5px solid #b8e8e2; padding: 4px 10px;
      font-size: 12px; font-weight: 600; border-radius: 7px;
      cursor: pointer; font-family: inherit;
    }
    .empty-state {
      padding: 36px 20px; text-align: center;
      color: #bbb; font-size: 13px; line-height: 1.7;
    }
    #toast {
      position: fixed; bottom: 28px; left: 50%;
      transform: translateX(-50%) translateY(70px);
      background: #1a1a1a; color: #fff;
      padding: 10px 22px; border-radius: 100px;
      font-size: 13px; font-weight: 500; z-index: 500;
      transition: transform .25s cubic-bezier(.34,1.56,.64,1);
      pointer-events: none; white-space: nowrap;
    }
    #toast.show { transform: translateX(-50%) translateY(0); }
    .footer { text-align: center; font-size: 13px; color: #1a1a1a; margin-top: 40px; line-height: 2; }
    .footer a { color: #41c9b4; font-weight: 500; text-decoration: none; }
    @media (max-width: 480px) {
      .wrap { padding: 16px 14px 0; }
      .header { padding: 24px 14px 16px; }
    }
  </style>
</head>
<body>

<div class="header">
  <span class="logo">note</span>
  <span class="logo-sub">読みやすく整形</span>
</div>

<div class="wrap">

  <div class="card">
    <div class="card-header">
      <span>① 元のテキスト</span>
      <span id="inputCount" style="font-size:13px;font-weight:400;color:#1a1a1a;">0 文字</span>
    </div>
    <textarea id="inputText" rows="7" placeholder="ここに記事テキストを貼り付けてください..."></textarea>
    <div class="resize-bar" id="rb1">
      <span>↕</span><span>ドラッグして枠を広げる</span>
    </div>
  </div>

  <div class="card">
    <div class="card-header">⚙ 整形設定</div>
    <div style="padding:10px 14px; display:flex; flex-direction:column; gap:10px;">
      <div style="display:flex; align-items:center; gap:8px; font-size:13px; color:#1a1a1a;">
        <span>累積文字数のしきい値</span>
        <input type="number" id="threshold" value="30" min="1" max="200" style="width:52px; border:1.5px solid #d8d2ca; border-radius:6px; padding:4px 6px; font-size:13px; font-weight:600; text-align:center; color:#1a1a1a; background:#fff; outline:none;">
      </div>
      <div style="display:flex; align-items:center; gap:8px;">
        <span class="tag-short">以下 → 空行なし</span>
        <span class="tag-long">超えたら → 空行あり</span>
      </div>
    </div>
  </div>

  <button class="btn-primary" onclick="confirmFormat()">✨ 読みやすく整形する</button>

  <!-- オーバーレイ -->
  <div id="overlay" onclick="hideModal()" style="display:none; position:fixed; inset:0; background:rgba(0,0,0,0.35); z-index:100;"></div>

  <!-- モーダル小窓 -->
  <div id="confirmModal" style="display:none; position:fixed; top:50%; left:50%; transform:translate(-50%,-50%); width:60%; max-width:400px; min-width:260px; background:#fff; border-radius:10px; border:1px solid #e8e4de; box-shadow:0 4px 24px rgba(0,0,0,0.15); z-index:101; overflow:hidden;">
    <div style="background:#fff8ee; padding:11px 16px; border-bottom:1px solid #f5dfa0; display:flex; align-items:center; gap:8px;">
      <span style="font-size:14px;">⚠️</span>
      <span style="font-size:13px; font-weight:600; color:#a05800;">上書き確認</span>
    </div>
    <div style="padding:16px;">
      <p style="font-size:13px; color:#1a1a1a; line-height:1.8; margin-bottom:16px;">② 整形後テキストに編集した内容があります。読みやすく整形すると上書きされます。よろしいですか？</p>
      <div style="display:flex; gap:10px; justify-content:flex-end;">
        <button onclick="hideModal()" style="background:#fff; color:#1a1a1a; border:1.5px solid #e8e4de; border-radius:6px; padding:8px 20px; font-size:13px; font-weight:600; cursor:pointer; font-family:'Noto Sans JP',sans-serif;">整形しない</button>
        <button onclick="executeFormat()" style="background-color:#41c9b4; color:#fff; border:none; border-radius:6px; padding:8px 20px; font-size:13px; font-weight:600; cursor:pointer; font-family:'Noto Sans JP',sans-serif;">整形する</button>
      </div>
    </div>
  </div>

  <div class="card">
    <div class="card-header">
      <span>② 整形後テキスト</span>
      <div class="output-tools">
        <button class="btn-icon" id="undoBtn" onclick="doUndo()" disabled>↩ 戻る</button>
        <button class="btn-icon" id="redoBtn" onclick="doRedo()" disabled>↪ 進む</button>
        <button class="btn-copy" onclick="copyAll()">📋 全コピー</button>
      </div>
    </div>
    <div id="emptyState" class="empty-state">整形後のテキストがここに表示されます。直接編集もできます。</div>
    <textarea id="outputText" rows="8" style="display:none;"></textarea>
    <div class="resize-bar" id="rb2" style="display:none;">
      <span>↕</span><span>ドラッグして枠を広げる</span>
    </div>
  </div>

  <div class="footer">
    製作者：<a href="https://note.com/ai48start" target="_blank" rel="noopener noreferrer">泰祥屋note店</a><br>
    <a href="https://note.com/ai48start" target="_blank" rel="noopener noreferrer">https://note.com/ai48start</a>
  </div>

</div>

<div id="toast"></div>

<script>
  var $input     = document.getElementById('inputText');
  var $output    = document.getElementById('outputText');
  var $undoBtn   = document.getElementById('undoBtn');
  var $redoBtn   = document.getElementById('redoBtn');
  var $empty     = document.getElementById('emptyState');
  var $inputCnt  = document.getElementById('inputCount');
  var $threshold = document.getElementById('threshold');
  var $rb2       = document.getElementById('rb2');

  function makeResizable(bar, ta) {
    var startY, startH;
    bar.addEventListener('mousedown', function(e) {
      startY = e.clientY; startH = ta.offsetHeight; e.preventDefault();
      function onMove(e) { ta.style.height = Math.max(80, startH + e.clientY - startY) + 'px'; }
      function onUp() { document.removeEventListener('mousemove', onMove); document.removeEventListener('mouseup', onUp); }
      document.addEventListener('mousemove', onMove);
      document.addEventListener('mouseup', onUp);
    });
    bar.addEventListener('touchstart', function(e) {
      startY = e.touches[0].clientY; startH = ta.offsetHeight;
      e.preventDefault();
      function onMove(e) {
        e.preventDefault();
        ta.style.height = Math.max(80, startH + e.touches[0].clientY - startY) + 'px';
      }
      function onEnd() { document.removeEventListener('touchmove', onMove); document.removeEventListener('touchend', onEnd); }
      document.addEventListener('touchmove', onMove, {passive: false});
      document.addEventListener('touchend', onEnd);
    }, {passive: false});
  }
  makeResizable(document.getElementById('rb1'), $input);
  makeResizable($rb2, $output);

  var hist = [], histIdx = -1;
  function saveHistory(text) {
    hist = hist.slice(0, histIdx + 1);
    hist.push(text);
    histIdx = hist.length - 1;
    refreshUndoRedo();
  }
  function doUndo() { if (histIdx > 0) { histIdx--; applyHistory(); } }
  function doRedo() { if (histIdx < hist.length - 1) { histIdx++; applyHistory(); } }
  function applyHistory() { showOutput(hist[histIdx]); refreshUndoRedo(); }
  function refreshUndoRedo() {
    $undoBtn.disabled = histIdx <= 0;
    $redoBtn.disabled = histIdx >= hist.length - 1;
  }

  $input.addEventListener('input', function() {
    $inputCnt.textContent = $input.value.length + ' 文字';
  });
  $output.addEventListener('input', function() { saveHistory($output.value); outputEdited = true; });

  var outputEdited = false;

  function confirmFormat() {
    var raw = $input.value;
    if (!raw.trim()) { showToast('テキストを貼り付けてください'); return; }
    if (outputEdited && $output.value.trim()) {
      document.getElementById('overlay').style.display = 'block';
      document.getElementById('confirmModal').style.display = 'block';
    } else {
      executeFormat();
    }
  }

  function hideModal() {
    document.getElementById('overlay').style.display = 'none';
    document.getElementById('confirmModal').style.display = 'none';
  }

  function executeFormat() {
    hideModal();
    var raw = $input.value;
    var t = parseInt($threshold.value) || 30;
    var result = doFormat(raw, t);
    showOutput(result);
    saveHistory(result);
    outputEdited = false;
    showToast('整形完了！');
  }

  function doFormat(text, threshold) {
    var lines = text.split('\n');
    var out = [];
    var cumulative = 0;
    for (var i = 0; i < lines.length; i++) {
      var line = lines[i];
      if (line.trim() === '') { out.push(''); cumulative = 0; continue; }
      cumulative += line.length;
      out.push(line);
      if (i < lines.length - 1 && cumulative > threshold) {
        out.push('');
        cumulative = 0;
      }
    }
    return out.join('\n').replace(/\n{3,}/g, '\n\n').trim();
  }

  function showOutput(text) {
    $empty.style.display  = 'none';
    $output.style.display = 'block';
    $rb2.style.display    = 'flex';
    $output.value         = text;
  }

  function copyAll() {
    if (!$output.value) { showToast('コピーするテキストがありません'); return; }
    navigator.clipboard.writeText($output.value)
      .then(function() { showToast('コピーしました！'); })
      .catch(function() { $output.select(); document.execCommand('copy'); showToast('コピーしました！'); });
  }

  var toastTimer;
  function showToast(msg) {
    var el = document.getElementById('toast');
    el.textContent = msg;
    el.classList.add('show');
    clearTimeout(toastTimer);
    toastTimer = setTimeout(function() { el.classList.remove('show'); }, 2000);
  }
</script>
</body>
</html>
